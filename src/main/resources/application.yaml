spring:
  application:
    name: study-room-platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/studyroom}
    username: postgres
    password: newpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Spring AI - OpenRouter (OpenAI-compatible)
  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      chat:
        options:
          model: openai/gpt-4o-mini
          temperature: 0.7
          max-tokens: 1000

app:
  jwt:
    secret:  StudySyncSecretKeyStudySyncSecretKey123456789
    expiration: 86400000        # 24 hours
    refresh-expiration: 604800000  # 7 days

  oauth2:
    authorized-redirect-uris:
      - ${FRONTEND_URL:http://localhost:3000}/oauth2/redirect
      - http://localhost:3000/oauth2/redirect

  frontend-url: ${FRONTEND_URL:http://localhost:3000}

server:
  port: ${PORT:8080}

logging:
  level:
    com.studyroom: DEBUG
    org.springframework.security: INFO
    org.springframework.ai: DEBUG
